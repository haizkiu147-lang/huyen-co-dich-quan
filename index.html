<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gieo Quẻ Kinh Dịch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gieo Quẻ</h1>
        <p class="subtitle">Thành tâm xin quẻ, nhấn nút để tung 3 đồng xu</p>
        
        <div class="coins-container">
            <div class="coin" id="coin1"><span class="coin-face">?</span></div>
            <div class="coin" id="coin2"><span class="coin-face">?</span></div>
            <div class="coin" id="coin3"><span class="coin-face">?</span></div>
        </div>

        <button id="tossBtn">Tung Đồng Xu</button>
        <button id="resetBtn" style="display: none;">Gieo Quẻ Mới</button>
        
        <div class="toss-counter">Lần gieo: <span id="tossCount">0</span>/6</div>
        <div id="result" class="result-text">Sẵn sàng gieo quẻ!</div>

        <!-- Khu vực vẽ 6 hào -->
        <div id="hexagram" class="hexagram-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
