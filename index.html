            const handleSerialChange = (val) => {

                if (digits.length > 0) {
                    const mid = Math.floor(digits.length / 2);
                    const s1 = digits.slice(0, mid);
                    const s2 = digits.slice(mid);
                    
                    let sum1 = s1.split('').reduce((acc, curr) => acc + parseInt(curr), 0);
                    let sum2 = s2.split('').reduce((acc, curr) => acc + parseInt(curr), 0);
                    
                    if (s1.length === 0) sum1 = sum2; 
                    if (sum1 === 0) sum1 = 8; 
                    if (sum2 === 0) sum2 = 8;
                    
                    const totalSum = sum1 + sum2;
                    let upper = sum1 % 8; if (upper === 0) upper = 8;
                    let lower = sum2 % 8; if (lower === 0) lower = 8;
                    let movingLine = totalSum % 6; if (movingLine === 0) movingLine = 6;

                    setNumUpper(upper.toString());
                    setNumLower(lower.toString());
                    setNumMoving(movingLine.toString());
                }
            };

            const layThandSat = (idx, chiName, lucThan) => {
                const stars = [];
                let tkList = [];
                const dayCanChi = dayCan + " " + dayChi;
                if (["Giáp Tý", "Ất Sửu", "Bính Dần", "Đinh Mão", "Mậu Thìn", "Kỷ Tỵ", "Canh Ngọ", "Tân Mùi", "Nhâm Thân", "Quý Dậu"].includes(dayCanChi)) tkList = ["Tuất", "Hợi"];
                else if (["Giáp Tuất", "Ất Hợi", "Bính Tý", "Đinh Sửu", "Mậu Dần", "Kỷ Mão", "Canh Thìn", "Tân Tỵ", "Nhâm Ngọ", "Quý Mùi"].includes(dayCanChi)) tkList = ["Thân", "Dậu"];
                else if (["Giáp Thân", "Ất Dậu", "Bính Tuất", "Đinh Hợi", "Mậu Tý", "Kỷ Sửu", "Canh Dần", "Tân Mão", "Nhâm Thìn", "Quý Tỵ"].includes(dayCanChi)) tkList = ["Ngọ", "Mùi"];
                else if (["Giáp Ngọ", "Ất Mùi", "Bính Thân", "Đinh Dậu", "Mậu Tuất", "Kỷ Hợi", "Canh Tý", "Tân Sửu", "Nhâm Dần", "Quý Mão"].includes(dayCanChi)) tkList = ["Thìn", "Tỵ"];
                else if (["Giáp Thìn", "Ất Tỵ", "Bính Ngọ", "Đinh Mùi", "Mậu Thân", "Kỷ Dậu", "Canh Tuất", "Tân Hợi", "Nhâm Tý", "Quý Sửu"].includes(dayCanChi)) tkList = ["Dần", "Mão"];
                else tkList = ["Tý", "Sửu"]; 

                if (tkList.includes(chiName)) stars.push("Tuần không");

                if (["Giáp", "Mậu"].includes(dayCan) && ["Sửu", "Mùi"].includes(chiName)) stars.push("Quý Nhân");
                else if (["Ất", "Kỷ"].includes(dayCan) && ["Tý", "Thân"].includes(chiName)) stars.push("Quý Nhân");
                else if (["Bính", "Đinh"].includes(dayCan) && ["Hợi", "Dậu"].includes(chiName)) stars.push("Quý Nhân");
                else if (["Canh", "Tân"].includes(dayCan) && ["Dần", "Ngọ"].includes(chiName)) stars.push("Quý Nhân");
                else if (["Nhâm", "Quý"].includes(dayCan) && ["Tỵ", "Mão"].includes(chiName)) stars.push("Quý Nhân");

                if (["Dần", "Ngọ", "Tuất"].includes(dayChi) && chiName === "Thân") stars.push("Thiên Mã");
                else if (["Thân", "Tý", "Thìn"].includes(dayChi) && chiName === "Dần") stars.push("Thiên Mã");

                else if (["Hợi", "Mão", "Mùi"].includes(dayChi) && chiName === "Tỵ") stars.push("Thiên Mã");

                else if (["Thân", "Tý", "Thìn"].includes(dayChi) && chiName === "Dậu") stars.push("Đào Hoa");
                else if (["Tỵ", "Dậu", "Sửu"].includes(dayChi) && chiName === "Ngọ") stars.push("Đào Hoa");
                else if (["Hợi", "Mão", "Mùi"].includes(dayChi) && chiName === "Tý") stars.push("Đào Hoa");

                if (["Dần", "Ngọ", "Tuất"].includes(dayChi) && chiName === "Tuất") stars.push("Hoa Cái");
                else if (["Thân", "Tý", "Thìn"].includes(dayChi) && chiName === "Thìn") stars.push("Hoa Cái");

                if (xungMap[dayChi] === chiName) stars.push("Nhật Phá");
                if (xungMap[monthChi] === chiName) stars.push("Nguyệt Phá");

                if (lucThan === "Quan Quỷ") stars.push("Bạch Hổ Sát");

            const toggleHaoDong = (index) => {

                nextMov[index] = !nextMov[index];

            const thietLapGioHienTai = () => {
                const current = new Date();
                const hh = String(current.getHours()).padStart(2, '0');
                const mm = String(current.getMinutes()).padStart(2, '0');
                setHours(`${hh}:${mm}`);
                const d = String(current.getDate()).padStart(2, '0');
                const m = String(current.getMonth() + 1).padStart(2, '0');
                const y = current.getFullYear();
                setDateString(`${d}/${m}/${y}`);

                const anchor = new Date(2024, 0, 1);
                const currentDay = new Date(y, current.getMonth(), current.getDate());
                const diffTime = currentDay - anchor;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                
                const canIdx = ((diffDays % 10) + 10) % 10;
                const chiIdx = ((diffDays % 12) + 12) % 12;
                
                setDayCan(THIEN_CAN[canIdx]);
                setDayChi(DIA_CHI[chiIdx]);

                const yearCanIdx = ((y - 4) % 10 + 10) % 10;
                let month1Can = 0; 
                if (yearCanIdx === 0 || yearCanIdx === 5) month1Can = 2; 
                else if (yearCanIdx === 1 || yearCanIdx === 6) month1Can = 4; 
                else if (yearCanIdx === 2 || yearCanIdx === 7) month1Can = 6; 
                else if (yearCanIdx === 3 || yearCanIdx === 8) month1Can = 8; 

                let lunarMonthIdx = current.getMonth();
                if(current.getDate() < 8) lunarMonthIdx -= 1; 
                if(lunarMonthIdx < 0) lunarMonthIdx += 12;

                const finalMonthCan = (month1Can + lunarMonthIdx - 1 + 10) % 10;
                const finalMonthChi = (2 + lunarMonthIdx - 1 + 12) % 12; 

                setMonthCan(THIEN_CAN[finalMonthCan]);
                setMonthChi(DIA_CHI[finalMonthChi]);

                    element: info.element,
                    lucThan: getLucThan(chuCungElement, info.element)
                });
            }

            // --- ENGINE MAI HOA ---
            const layQuaiMaiHoa = (num) => {
                const n = parseInt(num) || 1;
                const r = n % 8;
                const s = r === 0 ? 8 : r;
                return BAT_QUAI.find(q => q.number === s) || BAT_QUAI[0];
            };

            const layHaoDongMaiHoa = (num) => {
                const n = parseInt(num) || 1;
                const r = n % 6;
                return r === 0 ? 6 : r;
            };

            const mhUpperQuai = layQuaiMaiHoa(numUpper);
            const mhLowerQuai = layQuaiMaiHoa(numLower);
            const mhHaoDong = layHaoDongMaiHoa(numMoving);

            const totalMhBinBien = totalMhBinChu.map((v, i) => (i === (mhHaoDong - 1)) ? (v === 1 ? 0 : 1) : v);

            const mhLowerBienId = findTrigramFromBinary(totalMhBinBien.slice(0, 3));
            const mhUpperBienId = findTrigramFromBinary(totalMhBinBien.slice(3, 6));

            const hoLowerBin = [totalMhBinChu[1], totalMhBinChu[2], totalMhBinChu[3]];
            const hoUpperQuai = BAT_QUAI[findTrigramFromBinary(hoUpperBin)];
            const hoLowerQuai = BAT_QUAI[findTrigramFromBinary(hoLowerBin)];
            
            // Lấy tên thật của 3 quẻ Mai Hoa từ Database
            const mhChuName = HEXAGRAM_DATABASE[`${mhUpperQuai.id}_${mhLowerQuai.id}`]?.[0] || "Quẻ Lạ";
            const mhHoName = HEXAGRAM_DATABASE[`${hoUpperQuai.id}_${hoLowerQuai.id}`]?.[0] || "Quẻ Lạ";
            const mhBienName = HEXAGRAM_DATABASE[`${mhUpperBienId}_${mhLowerBienId}`]?.[0] || "Quẻ Lạ";

            const layLuanGiaiMaiHoa = () => {
                const theEl = theQuai.element;
                const dungEl = dungQuai.element;
                if (theEl === dungEl) return { status: "Tỷ hòa (Bình hòa - Cát)", desc: `Thể quẻ (${theQuai.name} - ${theEl}) và Dụng quẻ (${dungQuai.name} - ${dungEl}) cùng ngũ hành. Vạn sự hài hòa, có sự trợ giúp bền vững từ bằng hữu, đối tác.` };
                if (ELEMENTS_RELATION[theEl].sinh === dungEl) return { status: "Thể sinh Dụng (Tiêu hao - Thứ cát)", desc: `Thể hành ${theEl} sinh Dụng hành ${dungEl}. Bản thân phải hao tổn tiền tài, sức lực để lo toan gánh vác cho người khác.` };
                if (ELEMENTS_RELATION[dungEl].sinh === theEl) return { status: "Dụng sinh Thể (Đại Cát)", desc: `Dụng hành ${dungEl} sinh dưỡng cho Thể hành ${theEl}. Gặp nhiều may mắn, quý nhân phù trợ nhiệt tình, mưu cầu danh lợi đắc ý.` };
                if (ELEMENTS_RELATION[theEl].khac === dungEl) return { status: "Thể khắc Dụng (Cát lợi)", desc: `Thể hành ${theEl} khống chế được Dụng hành ${dungEl}. Dù gặp gian nan vất vả nhưng cuối cùng bản thân vẫn vượt qua và gặt hái thành công.` };
                if (ELEMENTS_RELATION[dungEl].khac === theEl) return { status: "Dụng khắc Thể (Hung hại)", desc: `Dụng hành ${dungEl} khắc Thể hành ${theEl}. Bất lợi, đề phòng tai ương, hao tài tốn của, tranh chấp hoặc bệnh tật.` };
                return { status: "Bình hòa", desc: "" };
            };
            const mhLuanGiai = layLuanGiaiMaiHoa();

            // --- TÍCH HỢP GEMINI AI ---
            const apiKey = ""; // API Key được tự động cung cấp
            
            const fetchAiInterpretation = async () => {
                setIsAiLoading(true);
                setAiResponse('');
                
                try {
                    let prompt = "";
                    if (systemType === 'luchao') {
                        const dongHaoText = moving.map((m, i) => m ? (i + 1) : null).filter(x => x).join(', ');
                        prompt = `Bạn là một chuyên gia Kinh Dịch và Lục Hào giàu kinh nghiệm. Người dùng muốn xem bói về chủ đề: "${topic}". Thời gian lập quẻ: Ngày ${dayCan} ${dayChi}, tháng ${monthCan} ${monthChi}. Quẻ chủ lập được là quẻ: ${chuName}. Quẻ biến là: ${bienName}. Các hào động: ${dongHaoText || 'Không có hào động'}. Hãy dựa vào các thông số này để luận đoán cát hung, phân tích chi tiết về mưu sự "${topic}" của người dùng. Viết khoảng 3-4 đoạn, ngôn từ rõ ràng, rành mạch và hướng thiện.`;
                    } else {
                        prompt = `Bạn là một bậc thầy Mai Hoa Dịch Số. Người dùng muốn xem quẻ về chủ đề: "${topic}". Quẻ Chủ (bắt đầu sự việc): ${mhChuName} (Thể: ${theQuai.name} hành ${theQuai.element}, Dụng: ${dungQuai.name} hành ${dungQuai.element}). Quẻ Hỗ (diễn biến sự việc): ${mhHoName}. Quẻ Biến (kết quả cuối cùng): ${mhBienName}. Hào động ở vị trí số ${mhHaoDong}. Hãy dựa theo tương sinh tương khắc giữa Thể và Dụng, kết hợp với ý nghĩa 3 quẻ để luận giải quá trình diễn biến của chủ đề "${topic}". Viết lời khuyên rõ ràng, dễ hiểu khoảng 3-4 đoạn.`;
                    }

                    const response = await callGeminiWithRetry(prompt);
                    setAiResponse(response);
                } catch (error) {
                    console.error(error);
                    setAiResponse("Lỗi khi kết nối với AI. Vui lòng thử lại sau.");
                } finally {
                    setIsAiLoading(false);
                }
            };
            
            const callGeminiWithRetry = async (promptText, retries = 5) => {
                const delays = [1000, 2000, 4000, 8000, 16000];
                for (let i = 0; i < retries; i++) {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: promptText }] }],
                                systemInstruction: { parts: [{ text: "Bạn là chuyên gia Kinh Dịch. Luôn trả lời bằng tiếng Việt, phân tích sâu sắc, khoa học và đưa ra lời khuyên mang tính xây dựng." }] }
                            })
                        });
                        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                        const data = await res.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "Không có phản hồi từ AI.";
                    } catch (e) {
                        if (i === retries - 1) throw e;
                        await new Promise(r => setTimeout(r, delays[i]));
                    }
                }
            };

            // XUẤT ẢNH CHỐNG CẮT
            const handleExportImage = () => {

                    exportBtn.disabled = false;
                    wrapper.style.overflowX = originalOverflow;
                });
            };

            return (
                <div className="max-w-6xl mx-auto flex flex-col items-center pb-12 px-2 sm:px-0">
                    
                    <div className="w-full bg-amber-900 text-amber-50 p-4 rounded-xl shadow-lg flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                        <div className="flex items-center gap-3">

                            <div>

                                <p className="text-xs text-amber-200">Lập quẻ Lục Hào & Mai Hoa Dịch Số chuyên sâu</p>
                            </div>
                        </div>
                        
                        {view === 'setup' && (
                            <div className="flex bg-amber-950/60 p-1 rounded-lg">
                                <button onClick={() => setSystemType('luchao')} className={`px-4 py-1.5 text-xs font-bold rounded-md transition-all ${systemType === 'luchao' ? 'bg-[#a91d1d] text-white shadow' : 'text-amber-200 hover:text-white'}`}>
                                    LỤC HÀO
                                </button>
                                <button onClick={() => setSystemType('maihoa')} className={`px-4 py-1.5 text-xs font-bold rounded-md transition-all ${systemType === 'maihoa' ? 'bg-[#a91d1d] text-white shadow' : 'text-amber-200 hover:text-white'}`}>
                                    MAI HOA
                                </button>
                            </div>
                        )}

                        {view === 'result' && (
                            <button onClick={handleNewQue} className="bg-amber-100 hover:bg-amber-200 text-amber-900 text-sm font-semibold py-1.5 px-4 rounded-lg flex items-center gap-2 shadow">
                                <i className="fa-solid fa-arrow-left"></i> Lập quẻ mới
                            </button>
                        )}
                    </div>

                    {/* SETUP VIEW */}
                    {view === 'setup' && (
                        <div className="w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
                            
                            <div className="lg:col-span-5 bg-white p-5 rounded-2xl shadow-xl border border-amber-200 flex flex-col gap-4">
                                
                                {/* Chọn Chủ đề */}
                                <div className="p-3 bg-amber-50 rounded-lg border border-amber-200">
                                    <label className="text-[12px] font-bold text-amber-900 block mb-1">
                                        <i className="fa-solid fa-crosshairs text-red-700"></i> Chủ đề dự đoán:
                                    </label>
                                    <select value={topic} onChange={e => setTopic(e.target.value)} className="w-full border border-amber-300 rounded p-2 text-sm outline-none bg-white font-bold text-gray-800 focus:border-red-500 shadow-sm">
                                        {TOPICS_LIST.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>

                                {/* Thời gian */}
                                <div>
                                    <div className="flex justify-between items-center mb-3">
                                        <h3 className="text-sm font-bold text-amber-900 uppercase flex items-center gap-2">
                                            <i className="fa-solid fa-clock"></i> Thời điểm lập quẻ
                                        </h3>
                                        <button onClick={thietLapGioHienTai} className="text-xs bg-amber-100 hover:bg-amber-200 text-amber-800 font-bold py-1 px-2 rounded">
                                            Thời gian thực
                                        </button>
                                    </div>
