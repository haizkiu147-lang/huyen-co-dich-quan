<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gieo Quẻ Mai Hoa</title>
    <style>
        :root { --primary: #2d3748; --accent: #b91c1c; --bg: #f7fafc; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; margin: 0; color: var(--primary); }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 20px; }
        #controls { text-align: center; margin-bottom: 20px; }
        .coin-box { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .coin { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; font-weight: bold; background: #edf2f7; }
        #hexagram { display: flex; flex-direction: column-reverse; align-items: center; gap: 5px; margin: 20px 0; }
        .hao { width: 100%; height: 10px; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; }
        .hao.am { background: #cbd5e0; justify-content: space-between; }
        .tk-marker { color: var(--accent); font-weight: bold; margin-left: 10px; }
        #result-info { text-align: center; padding: 15px; background: #fef2f2; border-radius: 8px; font-weight: bold; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 1rem; width: 100%; }
        button:disabled { background: #a0aec0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gieo Quẻ Mai Hoa</h1>
        <div class="coin-box">
            <div class="coin">?</div><div class="coin">?</div><div class="coin">?</div>
        </div>
        <div id="controls">
            <button id="tossBtn">Gieo Hào (<span id="tossCount">0</span>/6)</button>
            <button id="resetBtn" style="display:none; background: var(--accent);">Gieo Lại</button>
        </div>
        <div id="hexagram"></div>
        <div id="result-info">Sẵn sàng gieo quẻ</div>
    </div>

    <script>
        const coins = document.querySelectorAll('.coin');
        const tossBtn = document.getElementById('tossBtn');
        const resetBtn = document.getElementById('resetBtn');
        const tossCountSpan = document.getElementById('tossCount');
        const hexagramDiv = document.getElementById('hexagram');
        const resultInfo = document.getElementById('result-info');

        let currentToss = 0;

        tossBtn.addEventListener('click', () => {
            if (currentToss >= 6) return;
            
            let total = 0;
            coins.forEach(c => {
                const isNgua = Math.random() >= 0.5;
                c.innerText = isNgua ? 'N' : 'S';
                total += isNgua ? 3 : 2;
            });

            currentToss++;
            tossCountSpan.innerText = currentToss;
            
            const isAm = (total === 6 || total === 8);
            const isDong = (total === 6 || total === 9);
            
            const hao = document.createElement('div');
            hao.className = `hao ${isAm ? 'am' : 'duong'}`;
            hao.innerHTML = `<span>${isAm ? '-- --' : '-----'}</span><span class="tk-marker">${isDong ? 'Động' : ''}</span>`;
            hexagramDiv.appendChild(hao);

            if (currentToss === 6) {
                tossBtn.style.display = 'none';
                resetBtn.style.display = 'block';
                resultInfo.innerText = "Đã gieo xong quẻ!";
            }
        });

        resetBtn.addEventListener('click', () => {
            currentToss = 0;
            tossCountSpan.innerText = '0';
            hexagramDiv.innerHTML = '';
            coins.forEach(c => c.innerText = '?');
            tossBtn.style.display = 'block';
            resetBtn.style.display = 'none';
            resultInfo.innerText = "Sẵn sàng gieo quẻ!";
        });
    </script>
</body>
</html>
